name: Feature Request
description: Propose a feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What user/business problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: High-level design and expected behavior
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Measurable success criteria
    validations:
      required: true
  - type: textarea
    id: compliance
    attributes:
      label: Security/Compliance Impact
      description: Any impact on audit, privacy, or runtime hardening?
