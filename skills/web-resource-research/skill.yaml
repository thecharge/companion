name: web-resource-research
version: "1.0.0"
description: "Research a website resource and return focused notes with source metadata."
tags: [research, web, source-analysis]

tools:
  - name: research_web_resource
    description: "Fetch a URL and extract focused findings for a research goal."
    parameters:
      url:
        type: string
        description: "HTTP(S) URL to inspect"
        required: true
      focus:
        type: string
        description: "Optional research focus (for example pricing, architecture, API limits)"
        required: false
      max_chars:
        type: number
        description: "Maximum number of source characters to inspect (default 12000, max 30000)"
        required: false
    timeout: 45
    script: |
      python3 - << 'PYEOF'
      import os
      import re
      import sys
      import urllib.request

      url = (os.environ.get("COMPANION_ARG_URL") or "").strip()
      focus = (os.environ.get("COMPANION_ARG_FOCUS") or "").strip()
      max_chars_raw = (os.environ.get("COMPANION_ARG_MAX_CHARS") or "12000").strip()

      if not url:
        print("Error: url is required")
        sys.exit(1)
      if not (url.startswith("http://") or url.startswith("https://")):
        print("Error: url must start with http:// or https://")
        sys.exit(1)

      try:
        max_chars = int(max_chars_raw)
      except ValueError:
        max_chars = 12000
      max_chars = max(1000, min(max_chars, 30000))

      req = urllib.request.Request(
        url,
        headers={
          "User-Agent": "Companion/1.0",
          "Accept": "text/html,application/json;q=0.9,text/plain;q=0.8,*/*;q=0.5",
        },
      )

      try:
        with urllib.request.urlopen(req, timeout=20) as response:
          content_type = response.headers.get("Content-Type", "")
          raw = response.read(max_chars)
      except Exception as exc:
        print(f"Error: failed to fetch {url}: {exc}")
        sys.exit(1)

      text = raw.decode("utf-8", errors="replace")
      if "html" in content_type.lower() or "<html" in text.lower():
        text = re.sub(r"<script[\\s\\S]*?</script>", " ", text, flags=re.IGNORECASE)
        text = re.sub(r"<style[\\s\\S]*?</style>", " ", text, flags=re.IGNORECASE)
        text = re.sub(r"<[^>]+>", " ", text)
      text = re.sub(r"\\s+", " ", text).strip()

      if not text:
        print(f"Source: {url}")
        print("No readable text extracted.")
        sys.exit(0)

      preview = text[:max_chars]
      sentences = re.split(r"(?<=[.!?])\\s+", preview)
      selected = []

      if focus:
        focus_terms = [t for t in re.split(r"[^a-zA-Z0-9]+", focus.lower()) if t]
        for sentence in sentences:
          s = sentence.strip()
          if not s:
            continue
          low = s.lower()
          if any(term in low for term in focus_terms):
            selected.append(s)
          if len(selected) >= 8:
            break

      if not selected:
        selected = [s.strip() for s in sentences if s.strip()][:8]

      print(f"Source: {url}")
      print(f"Content-Type: {content_type or 'unknown'}")
      if focus:
        print(f"Focus: {focus}")
      print("Findings:")
      for idx, sentence in enumerate(selected, start=1):
        print(f"{idx}. {sentence}")
      PYEOF
