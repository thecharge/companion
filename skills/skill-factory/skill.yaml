name: skill-factory
version: "1.0.0"
description: "Creates scaffolded Companion skills from structured parameters."
tags: [skills, scaffolding, automation]

tools:
  - name: create_skill_template
    description: "Create a new skill folder and skill.yaml scaffold under ./skills"
    parameters:
      skill_name:
        type: string
        description: "Human-readable skill name (e.g. weather-fetcher)"
        required: true
      description:
        type: string
        description: "Skill description"
        required: true
      tool_name:
        type: string
        description: "Generated tool function name"
        required: true
      arg_name:
        type: string
        description: "Primary argument name for scaffold"
        required: false
    timeout: 20
    script: |
      python3 - << 'PYEOF'
      import os
      import re
      import sys

      root = os.path.join(os.environ.get('WORKING_DIR', '.'), 'skills')
      os.makedirs(root, exist_ok=True)

      skill_name = os.environ.get('COMPANION_ARG_SKILL_NAME', 'new-skill').strip() or 'new-skill'
      desc = os.environ.get('COMPANION_ARG_DESCRIPTION', 'Generated skill').strip() or 'Generated skill'
      tool_name = os.environ.get('COMPANION_ARG_TOOL_NAME', 'generated_tool').strip() or 'generated_tool'
      arg_name = os.environ.get('COMPANION_ARG_ARG_NAME', 'input').strip() or 'input'

      slug = re.sub(r'[^a-z0-9]+', '-', skill_name.lower()).strip('-')[:64] or 'new-skill'
      tool_name = re.sub(r'[^a-z0-9_]+', '_', tool_name.lower()).strip('_')[:64] or 'generated_tool'
      arg_name = re.sub(r'[^a-z0-9_]+', '_', arg_name.lower()).strip('_')[:64] or 'input'

      skill_dir = os.path.join(root, slug)
      os.makedirs(skill_dir, exist_ok=True)
      out = os.path.join(skill_dir, 'skill.yaml')

      if os.path.exists(out):
          print(f'ERROR: skill already exists: {out}')
          sys.exit(1)

      content = "\n".join([
          f"name: {slug}",
          'version: "1.0.0"',
          f'description: "{desc}"',
          'tags: [generated, scaffold]',
          '',
          'tools:',
          f'  - name: {tool_name}',
          f'    description: "{desc}"',
          '    parameters:',
          f'      {arg_name}:',
          '        type: string',
          '        description: "Primary input"',
          '        required: true',
          '    timeout: 30',
          '    script: |',
          '      set -eu',
          f'      echo "TODO: implement {tool_name}"',
          f'      echo "{arg_name}: ${{COMPANION_ARG_{arg_name.upper()}}}"',
          '',
      ])

      with open(out, 'w', encoding='utf-8') as f:
          f.write(content)

      print(f'Created skill scaffold: {out}')
      PYEOF
