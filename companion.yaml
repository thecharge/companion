server:
  port:   ${COMPANION_PORT:-3000}
  host:   "0.0.0.0"
  secret: ${COMPANION_SECRET:-dev-secret}

db:
  driver: sqlite                  # sqlite | postgres
  sqlite:
    path: ./data/companion.db
  postgres:
    url: ${DATABASE_URL:-}

vector:
  backend:   sqlite-vec            # sqlite-vec | qdrant
  qdrant:
    url:        http://localhost:6333
    collection: companion
  embedding:
    model:      nomic-embed-text
    dimensions: 768

# No API keys required for the "local" alias — uses Ollama.
# The server checks Ollama health on startup and logs which models are available.
# To run fully local (no cloud keys): set all agent models to "local" below.
models:
  local:
    provider:    ollama
    # qwen3:1.7b — native tool calling, 1.1GB, Ollama tools-tagged model.
    # Runs on any machine with 2GB+ RAM. Supports function calls natively
    # (no JSON ReAct fallback needed). Reasoning via <think> blocks stripped automatically.
    #
    # Pull:  ollama pull qwen3:1.7b
    # Larger options with same native tool support:
    #   qwen3:4b   (~2.5GB)   qwen3:8b  (~5GB)
    #   granite4:1b (~700MB)  — IBM, also tools-tagged, even smaller
    model:       qwen3:1.7b
    base_url:    ${OLLAMA_BASE_URL:-http://localhost:11434}
    max_tokens:  4096
    temperature: 0.6               # qwen3 docs recommend 0.6 for non-thinking mode
  smart:
    provider:    anthropic
    model:       claude-sonnet-4-5-20251101
    api_key:     ${ANTHROPIC_API_KEY:-}
    max_tokens:  8192
    temperature: 0.3
  fast:
    provider:    anthropic
    model:       claude-haiku-4-5-20251001
    api_key:     ${ANTHROPIC_API_KEY:-}
    max_tokens:  4096
    temperature: 0.1

orchestrator:
  model:          local           # any alias — swap to "smart" for complex tasks
  max_rounds:     3               # was 10 — lower prevents runaway loops
  verify_results: false           # disabled: same 3B model verifying itself is noise

agents:
  analyst:
    model:       local             # set to "smart" when ANTHROPIC_API_KEY is configured
    description: "Reads and analyses documents, code, and data. Produces structured observations."
    tools:       [read_file, search_history, search_memory, web_fetch, skill_of_skills]
    reads_from:  [goal, observations]
    writes_to:   [observations]
    max_turns:   6

  engineer:
    model:       local             # set to "smart" for complex code tasks with API key
    description: "Writes, edits, and tests code. Uses file and shell tools to implement features."
    tools:       [read_file, write_file, list_dir, run_shell, run_tests, search_history]
    reads_from:  [goal, observations, artifacts]
    writes_to:   [artifacts, observations]
    max_turns:   12

  responder:
    model:       local             # set to "fast" when ANTHROPIC_API_KEY is configured
    description: "Synthesises agent outputs into a clear, concise reply to the user."
    tools:       []
    reads_from:  [goal, observations, artifacts, decisions]
    writes_to:   []
    max_turns:   2

memory:
  context_window:
    max_messages: 40
    max_tokens:   8000
  sliding_window:
    chunk_size:  2000
    page_size:   20
  recall:
    top_k:         5
    min_score:     0.72
    cross_session: false
  summarisation:
    enabled:          true
    trigger_at_messages: 60
    model:            fast

mode:
  default: local
  presets:
    local:
      description: "Local model only — fast, free, private"
    balanced:
      description: "Local orchestrator + cloud agents for heavy tasks"
    cloud:
      description: "Cloud orchestrator and agents — maximum capability"

# ── Sandbox ───────────────────────────────────────────────────
# Controls how run_shell and run_tests execute commands.
#
# runtime options:
#   auto    — probe docker → podman → nerdctl in order; use first available (default)
#   docker  — use Docker explicitly; error at startup if not available
#   podman  — use Podman explicitly; error at startup if not available
#   nerdctl — use nerdctl (containerd CLI); error at startup if not available
#   direct  — skip containers, run in host shell (dev/trusted environments only)
#
# allow_direct_fallback:
#   true  (default) — if auto finds no runtime, warn and run commands directly
#   false — if auto finds no runtime, refuse all shell tool calls (safer for prod)
#
# network:
#   none   (default) — no network access inside container
#   host   — share host network (needed if tools must reach localhost services)
#   bridge — standard bridge NAT
#
# Timeouts can be tuned here rather than buried in tool definitions.
sandbox:
  runtime:               ${COMPANION_SANDBOX_RUNTIME:-auto}
  allow_direct_fallback: true
  image:                 companion-sandbox:latest
  network:               none
  timeout_seconds:       30
  tests_timeout_seconds: 120

tools:
  web_fetch:
    timeout_seconds: 15
