# Companion — full stack compose
#
# Services:
#   server   — Companion HTTP + WebSocket server (port 3000)
#   ollama   — Ollama model server (port 11434)
#
# Usage:
#   docker compose up                         # start everything
#   docker compose up server                  # server only (use existing Ollama)
#   docker compose --profile gpu up           # enable GPU passthrough for Ollama
#   docker compose down -v                    # stop and remove volumes
#
# On first run, pull your model:
#   docker compose exec server bun run pull
#
# Environment:
#   Copy .env.example to .env and set COMPANION_SECRET and any API keys.
#   OLLAMA_BASE_URL is set automatically to the ollama service.

services:

  # ── Companion server ────────────────────────────────────────
  server:
    build:
      context: ..                             # repo root
      dockerfile: docker/server/Dockerfile
    image: companion-server:latest
    container_name: companion-server
    restart: unless-stopped
    ports:
      - "${COMPANION_PORT:-3000}:3000"
    environment:
      COMPANION_PORT:            "${COMPANION_PORT:-3000}"
      COMPANION_SECRET:          "${COMPANION_SECRET:-dev-secret}"
      COMPANION_SANDBOX_RUNTIME: "direct"     # server container has no docker socket
      OLLAMA_BASE_URL:           "http://ollama:11434"
      ANTHROPIC_API_KEY:         "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY:            "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY:            "${GEMINI_API_KEY:-}"
      DATABASE_URL:              "${DATABASE_URL:-}"
    volumes:
      # Persist SQLite database and vector store across restarts
      - companion-data:/app/data
      # Persist agent working files
      - companion-workspace:/app/workspace
      # Mount companion.yaml from host so you can edit config without rebuilding
      - ../companion.yaml:/app/companion.yaml:ro
      # Mount skills directory so you can add skills without rebuilding
      - ../skills:/app/skills:ro
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e",
             "fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 15s
    networks:
      - companion-net

  # ── Ollama ──────────────────────────────────────────────────
  # Runs the local model server. CPU-only by default.
  # For GPU support: docker compose --profile gpu up
  ollama:
    image: ollama/ollama:latest
    container_name: companion-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"               # expose for direct access / debugging
    volumes:
      - ollama-models:/root/.ollama # persist downloaded models
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 30s             # ollama takes a moment to initialise
    networks:
      - companion-net

  # ── Ollama with GPU (profile: gpu) ──────────────────────────
  # Activated with: docker compose --profile gpu up
  # Requires NVIDIA Container Toolkit: https://docs.nvidia.com/datacenter/cloud-native/
  ollama-gpu:
    image: ollama/ollama:latest
    container_name: companion-ollama-gpu
    profiles: [gpu]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 30s
    networks:
      - companion-net

volumes:
  companion-data:
    driver: local
  companion-workspace:
    driver: local
  ollama-models:
    driver: local

networks:
  companion-net:
    driver: bridge
